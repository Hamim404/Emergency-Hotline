<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Hotline</title>
    <!-- daisyUI and tailwind cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <script
      src="https://kit.fontawesome.com/14d25571fc.js"
      crossorigin="anonymous"
    ></script>

    <!-- Font Style -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Madurai:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .font-hind-madurai {
        font-family: "Hind Madurai", sans-serif;
      }
    </style>
  </head>
  <body class="font-hind-madurai bg-[#f5fff6]">
    <!-- Navbar -->
    <div
      class="navbar flex justify-between items-center container mx-auto bg-white"
    >
      <div class="flex items-center gap-4">
        <img src="./assets/logo.png" alt="" class="w-15" />
        <h2 class="text-xl font-extrabold text-[#006747]">
          Emergency<br />Services
        </h2>
      </div>
      <div class="flex justify-center items-center gap-2">
        <div
          class="bg-[#ecfff0] w-20 p-2 flex items-center justify-center gap-4 rounded-xl"
        >
          <span class="font-bold text-lg">0</span>
          <i class="fa-solid fa-heart text-red-600 text-xl"> </i>
        </div>
        <div
          class="bg-[#ecfff0] w-20 p-2 flex items-center justify-center gap-4 rounded-xl"
        >
          <span class="font-bold text-lg">100</span>
          <i class="fa-solid fa-coins text-lg text-yellow-400"></i>
        </div>
        <div
          class="bg-[#00a63e] w-20 p-2 flex items-center justify-center gap-4 rounded-xl text-white font-bold"
        >
          <span class="text-lg">0</span>
          Copy
        </div>
      </div>
    </div>

    <!-- Hero Section -->
    <section
      id="hero-section"
      class="flex justify-center items-center gap-3 flex-col bg-linear-to-r from-[#013223] via-[#006747] to-[#013223] text-white py-6 mb-12"
    >
      <img src="./assets/logo-dark.png" alt="" class="w-24" />
      <h1 class="text-3xl font-bold">Emergency Service Directory</h1>
      <p class="text-xl font-bold">
        Government Emergency Services at Your Fingertip – A Project by
        Government of the People’s Republic of Bangladesh
      </p>
    </section>


    <!-- Script Link -->
    <script src="script.js"></script>
  </body>
</html>
